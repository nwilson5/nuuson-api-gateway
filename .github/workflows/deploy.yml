---
name: Deploy

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: Dry-run bundle check
        run: npx wrangler deploy --dry-run --outdir /tmp/worker-dist

  deploy:
    needs: validate
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    uses: nwilson5/cicd/.github/workflows/deploy-cloudflare-worker.yml@main
    with:
      worker-name: nuuson-api-gateway
      vault_addr: ${{ vars.VAULT_ADDR }}
      vault_role: project-nuuson-api-gateway
